<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Lal Kitab Live Session</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #020617);
      color: #e5e7eb;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      max-width: 420px;
      width: 100%;
      background: #0b1220;
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
      text-align: center;
    }
    h1 { font-size: 26px; margin-bottom: 6px; color: #f9fafb; }
    .tagline { opacity: 0.8; margin-bottom: 16px; }
    .price { font-size: 32px; font-weight: 800; color: #22c55e; margin: 12px 0 20px; }
    .features { text-align: left; margin: 0 0 22px; padding: 0; }
    .features li { list-style: none; margin-bottom: 8px; }
    .features li::before { content: "✔ "; color: #22c55e; }
    button {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
      cursor: pointer;
      font-weight: 700;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: #052e16;
      box-shadow: 0 8px 20px rgba(34,197,94,.35);
    }
    .form { margin-top: 16px; }
    .form input {
      width: 100%;
      padding: 12px;
      margin-bottom: 12px;
      border-radius: 8px;
      border: 1px solid #1f2933;
      background: #020617;
      color: #e5e7eb;
      outline: none;
    }
    .hidden { display: none; }
    .success {
      margin-top: 16px;
      background: #052e16;
      padding: 16px;
      border-radius: 12px;
      color: #86efac;
    }
    .footer { margin-top: 18px; font-size: 12px; opacity: .7; }
  </style>

  <script>
    var firebaseConfig = {
      apiKey: "AIzaSyA5pWE5v7GJZuHtZsIHpuwCUWWCFI_Tt5k",
      authDomain: "vedic-lal-kitab.firebaseapp.com",
      databaseURL: "https://vedic-lal-kitab-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "vedic-lal-kitab",
      storageBucket: "vedic-lal-kitab.firebasestorage.app",
      messagingSenderId: "429980316495",
      appId: "1:429980316495:web:fcb81e86cbd6b1127f8b3a"
    };
    firebase.initializeApp(firebaseConfig);
    var database = firebase.database();
  </script>
</head>

<body>
  <div class="card">
    <h1>Live Lal Kitab Session</h1>
    <p class="tagline">2 Hours • Beginner Friendly • Live on Zoom</p>
    <div class="price">₹49</div>

    <ul class="features">
      <li>Basic Lal Kitab Remedies</li>
      <li>Dos & Don’ts in Astrology</li>
      <li>Live Q&A with Expert</li>
      <li>Recording Provided</li>
    </ul>

    <button id="showFormBtn">Book Your Seat</button>

    <div id="detailsBox" class="form hidden">
      <input id="name" type="text" placeholder="Name" />
      <input id="email" type="email" placeholder="Email" />
      <input id="mobile" type="tel" placeholder="Mobile" />
      <button id="payBtn">Pay Now</button>
    </div>

    <div id="successBox" class="success hidden">
      <h2>🎉 Payment Successful</h2>
      <p>We’ll contact you on WhatsApp & Email with session details.</p>
    </div>

    <div class="footer">🔒 Secure payments by Razorpay</div>
  </div>

  <script>
    document.getElementById("showFormBtn").onclick = function () {
      document.getElementById("detailsBox").classList.remove("hidden");
    };

    document.getElementById("payBtn").onclick = function () {
      var name = document.getElementById("name").value;
      var email = document.getElementById("email").value;
      var mobile = document.getElementById("mobile").value;

      fetch("/.netlify/functions/create-order", { method: "POST" })
        .then(function (res) { return res.json(); })
        .then(function (order) {

          var options = {
            key: order.key,
            amount: order.amount,
            currency: "INR",
            order_id: order.id,
            name: "Lal Kitab Session",

            handler: function (response) {

              fetch("/.netlify/functions/verify-payment", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                  razorpay_order_id: response.razorpay_order_id,
                  razorpay_payment_id: response.razorpay_payment_id,
                  razorpay_signature: response.razorpay_signature,
                  name: name,
                  email: email,
                  mobile: mobile
                })
              })
              .then(function (res) { return res.json(); })
              .then(function (result) {

                if (result.success) {
                  database.ref("payments").push({
                    name: name,
                    email: email,
                    mobile: mobile,
                    payment_id: response.razorpay_payment_id,
                    time: new Date().toString()
                  });

                  document.getElementById("detailsBox").classList.add("hidden");
                  document.getElementById("successBox").classList.remove("hidden");
                } else {
                  alert("Payment verification failed");
                }
              });
            }
          };

          new Razorpay(options).open();
        });
    };
  </script>
</body>
</html>
